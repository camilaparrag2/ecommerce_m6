{% extends "base.html" %}
{% block title %}Inicio - E-Commerce{% endblock %}
{% block content %}
<div class="text-center py-5">
    <h1 class="display-4 fw-bold">Bienvenido a E-Commerce</h1>
    <p class="lead text-muted">Tu tienda de confianza para productos increíbles.</p>
    <div class="mt-4">
        {% if user.is_authenticated %}
            <a href="{% url 'dashboard' %}" class="btn btn-dark btn-lg me-2">Ir al Dashboard</a>
            <a href="{% url 'products' %}" class="btn btn-outline-dark btn-lg">Ver Productos</a>
        {% else %}
            <a href="{% url 'register' %}" class="btn btn-dark btn-lg me-2">Comenzar</a>
            <a href="{% url 'login' %}" class="btn btn-outline-dark btn-lg">Iniciar sesión</a>
        {% endif %}
    </div>
</div>
{% endblock %}
